<h1>Articles</h1>
<ul class="article-list">
  @for (article of articles(); track article.slug) {
    <li>
      <a [routerLink]="article.slug">
        <h2>{{ article.title }}</h2>
        <p class="meta">
          <time [attr.datetime]="article.publishedAt">{{ article.publishedAt }}</time>
        </p>
        <p>{{ article.excerpt }}</p>
      </a>
    </li>
  } @empty {
    <li>No articles yet.</li>
  }
</ul>
